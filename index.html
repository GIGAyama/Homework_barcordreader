<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 (Dialogs) -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
/**
 * Application Logic v1.0 (Email Customization)
 */
const app = {
  currentStudent: null,
  tasks: [],
  isSetup: false,
  isKeypadMode: false,
  keypadBuffer: '',
  
  init: function(serverIsSetup) {
    this.isSetup = serverIsSetup;
    if (this.isSetup) {
      this.switchView('standby');
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('report-start').value = today;
      document.getElementById('report-end').value = today;
      document.getElementById('adm-check-date').value = today;
    } else {
      this.switchView('setup');
    }
    this.showLoading(false);
    
    const input = document.getElementById('barcode-input');
    const standbyView = document.getElementById('view-standby');
    if(input) {
      setInterval(() => {
        const isStandbyActive = standbyView && !standbyView.classList.contains('d-none');
        if(this.isSetup && isStandbyActive && !this.isKeypadMode && document.activeElement.tagName !== 'INPUT' && !Swal.isVisible()) {
          input.focus();
        }
      }, 500);
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
          this.scan(input.value.trim());
          input.value = '';
        }
      });
    }
  },

  showLoading: function(show) {
    const el = document.getElementById('loading');
    if(el) {
      if (show) {
        el.classList.remove('d-none');
        el.style.display = 'flex';
        requestAnimationFrame(() => el.style.opacity = 1);
      } else {
        el.style.opacity = 0;
        setTimeout(() => {
          el.style.display = 'none';
          el.classList.add('d-none');
        }, 300);
      }
    }
  },

  toggleInputMode: function(mode) {
    const barcodeDiv = document.getElementById('mode-barcode');
    const keypadDiv = document.getElementById('mode-keypad');
    const display = document.getElementById('keypad-display');
    const input = document.getElementById('barcode-input');
    if (mode === 'keypad') {
      this.isKeypadMode = true;
      barcodeDiv.classList.add('d-none'); keypadDiv.classList.remove('d-none');
      this.keypadBuffer = ''; display.innerText = '';
    } else {
      this.isKeypadMode = false;
      keypadDiv.classList.add('d-none'); barcodeDiv.classList.remove('d-none');
      if(input) input.focus();
    }
  },
  keypadInput: function(num) {
    const display = document.getElementById('keypad-display');
    if (this.keypadBuffer.length < 10) { this.keypadBuffer += num; display.innerText = this.keypadBuffer; }
  },
  keypadClear: function() {
    this.keypadBuffer = ''; document.getElementById('keypad-display').innerText = '';
  },
  keypadSubmit: function() {
    if (this.keypadBuffer.trim() === '') return;
    this.scan(this.keypadBuffer); this.keypadClear();
  },

  runSetup: function() {
    Swal.fire({ title: '準備をはじめます', text: 'スプレッドシートを作成しています...', icon: 'info', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    google.script.run.withSuccessHandler((res) => {
      if(res.success) {
        Swal.fire({ icon: 'success', title: '完了!', text: 'システムが使えるようになりました。', confirmButtonText: 'はじめる' })
          .then(() => { this.isSetup = true; this.switchView('standby'); });
      } else { Swal.fire('エラー', res.error, 'error'); }
    }).runInitialSetup();
  },

  scan: function(id) {
    if (!this.isSetup) return;
    this.showLoading(true);
    google.script.run.withSuccessHandler((res) => {
      this.showLoading(false);
      if(res.error) { this.toast('error', res.message); return; }
      this.currentStudent = res.student;
      this.renderTasks(res.tasks);
      document.getElementById('st-name').innerText = res.student.name;
      this.switchView('student');
    }).withFailureHandler(this.errorHandler).getStudentData(id);
  },

  renderTasks: function(tasks) {
    const container = document.getElementById('task-list');
    container.innerHTML = '';
    if(tasks.length === 0) { container.innerHTML = '<div class="col-12 text-center text-muted">今日の課題はありません 😊</div>'; return; }
    tasks.forEach(task => {
      const col = document.createElement('div'); col.className = 'col-6';
      const card = document.createElement('div'); card.className = `card task-card h-100 p-3 shadow-sm ${task.done ? 'done' : ''}`;
      card.onclick = (e) => e.currentTarget.classList.toggle('selected');
      card.dataset.name = task.name; card.dataset.date = task.date;
      let badgeHtml = '';
      if(task.type === '週回数') badgeHtml = `<span class="badge bg-info text-dark mb-2">今週: ${task.weeklyCount}/${task.weeklyTarget}回</span>`;
      card.innerHTML = `<div class="d-flex align-items-center justify-content-center flex-column h-100" style="pointer-events: none;">${badgeHtml}<i class="bi ${task.done ? 'bi-check-circle-fill text-success' : 'bi-circle text-secondary'} fs-1 mb-2"></i><span class="fw-bold lh-sm text-center">${task.name}</span><small class="text-muted mt-1">${task.done ? '<ruby>提出<rt>ていしゅつ</rt></ruby>済' : ''}</small></div>`;
      col.appendChild(card); container.appendChild(col);
    });
  },

  submit: function() {
    const selected = document.querySelectorAll('.task-card.selected');
    if(selected.length === 0) { this.toast('warning', '<ruby>提出<rt>ていしゅつ</rt></ruby>するものを選んでね'); return; }
    const payload = { id: this.currentStudent.id, name: this.currentStudent.name, tasks: Array.from(selected).map(el => ({ name: el.dataset.name, date: el.dataset.date })) };
    this.showLoading(true);
    google.script.run.withSuccessHandler(() => {
      this.showLoading(false);
      Swal.fire({ icon: 'success', title: 'できた！', text: `${this.currentStudent.name}さん、うけつけました`, timer: 3000, showConfirmButton: false }).then(() => this.reset());
    }).submitHomework(payload);
  },

  reset: function() {
    this.currentStudent = null; this.switchView('standby');
    if (this.isKeypadMode) { this.keypadClear(); }
    else { const input = document.getElementById('barcode-input'); if(input) { input.value = ''; input.focus(); } }
  },

  switchView: function(viewName) {
    ['setup', 'standby', 'student', 'admin'].forEach(v => { const el = document.getElementById(`view-${v}`); if(el) el.classList.add('d-none'); });
    const target = document.getElementById(`view-${viewName}`);
    if(target) {
      target.classList.remove('d-none');
      if(viewName === 'standby' && !this.isKeypadMode) { setTimeout(() => { const input = document.getElementById('barcode-input'); if(input) input.focus(); }, 100); }
    }
  },

  showAdminAuth: function() {
    Swal.fire({ title: '先生用メニュー', input: 'password', inputLabel: 'PINコード', inputPlaceholder: '****', confirmButtonText: 'ログイン', showCancelButton: true })
    .then((result) => {
      if (result.isConfirmed) {
        this.showLoading(true);
        google.script.run.withSuccessHandler(isValid => {
          if (isValid) { this.loadAdminData(); } else { this.showLoading(false); this.toast('error', 'パスワードが違います'); }
        }).verifyPassword(result.value);
      }
    });
  },

  loadAdminData: function() {
    google.script.run.withSuccessHandler(data => {
      this.showLoading(false);
      this.renderAdminList(data.tasks);
      this.renderStudentList(data.students);
      if(data.config) {
        if(data.config.notification_time) document.getElementById('conf-time').value = data.config.notification_time;
        if(data.config.email_subject) document.getElementById('conf-subject').value = data.config.email_subject;
        if(data.config.admin_password) document.getElementById('conf-pass').value = data.config.admin_password;
        if(data.config.notification_email) document.getElementById('conf-email').value = data.config.notification_email;
      }
      this.loadDailyTasks();
      this.switchView('admin');
      if(document.getElementById('report-date').value) this.loadReport();
    }).getAdminData();
  },

  setCheckDateToday: function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('adm-check-date').value = today;
    this.loadDailyTasks();
  },
  loadDailyTasks: function() {
    const dateStr = document.getElementById('adm-check-date').value;
    if(!dateStr) return;
    this.showLoading(true);
    google.script.run.withSuccessHandler(tasks => {
      this.showLoading(false);
      const list = document.getElementById('admin-daily-task-list');
      list.innerHTML = '';
      if(tasks.length === 0) {
        list.innerHTML = '<li class="list-group-item text-center text-muted">この日に有効な課題はありません</li>';
      } else {
        tasks.forEach(t => {
          const li = document.createElement('li');
          li.className = 'list-group-item d-flex justify-content-between align-items-center';
          li.innerHTML = `<div><span class="badge bg-primary me-2">${t.type}</span><span class="fw-bold">${t.name}</span></div><button class="btn btn-sm btn-outline-danger" title="この日だけ除外" onclick="app.excludeTask('${t.uuid}', '${dateStr}')"><i class="bi bi-trash"></i></button>`;
          list.appendChild(li);
        });
      }
    }).getAdminDailyTasks(dateStr);
  },
  excludeTask: function(taskUuid, dateStr) {
    Swal.fire({ title: 'この日だけ除外しますか？', text: `${dateStr} のこの課題を取り消します。`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: '除外する' })
    .then((result) => {
      if(result.isConfirmed) {
        this.showLoading(true);
        google.script.run.withSuccessHandler(tasks => {
          this.showLoading(false);
          this.loadDailyTasks(); 
          this.toast('success', '除外しました');
        }).excludeTask(taskUuid, dateStr);
      }
    });
  },

  renderAdminList: function(tasks) {
    const list = document.getElementById('admin-task-list'); list.innerHTML = '';
    tasks.forEach(t => {
      const li = document.createElement('li'); li.className = 'list-group-item d-flex justify-content-between align-items-center';
      let badgeColor = 'bg-secondary';
      if(t.type === '日付指定') badgeColor = 'bg-primary'; if(t.type === '曜日固定') badgeColor = 'bg-success'; if(t.type === '毎日（平日）') badgeColor = 'bg-warning text-dark'; if(t.type === '週回数') badgeColor = 'bg-info text-dark';
      li.innerHTML = `<div><span class="badge ${badgeColor} me-2">${t.type}</span><span class="fw-bold">${t.name}</span><br><small class="text-muted">${t.value}</small></div><button class="btn btn-sm btn-outline-danger" onclick="app.deleteTask('${t.uuid}')"><i class="bi bi-trash"></i></button>`;
      list.appendChild(li);
    });
  },
  toggleAdminInputs: function() {
    const type = document.getElementById('adm-type').value;
    const els = { date: document.getElementById('adm-date'), day: document.getElementById('adm-day'), special: document.getElementById('adm-special'), weekCount: document.getElementById('adm-week-count') };
    Object.values(els).forEach(e => e.classList.add('d-none'));
    if(type === '日付指定') els.date.classList.remove('d-none'); 
    if(type === '曜日固定') els.day.classList.remove('d-none'); 
    if(type === '特別') els.special.classList.remove('d-none');
    if(type === '週回数') els.weekCount.classList.remove('d-none');
  },
  addTask: function() {
    const type = document.getElementById('adm-type').value, name = document.getElementById('adm-name').value;
    if(!name) return this.toast('warning', '課題名を入力してください');
    let value = '平日', deadline = '';
    if(type === '日付指定') value = document.getElementById('adm-date').value;
    if(type === '曜日固定') value = document.getElementById('adm-day').value;
    if(type === '特別') { value = document.getElementById('adm-start').value; deadline = document.getElementById('adm-dead').value; }
    if(type === '週回数') value = document.getElementById('adm-count').value;
    this.showLoading(true);
    google.script.run.withSuccessHandler(data => {
      this.showLoading(false); this.renderAdminList(data.tasks); document.getElementById('adm-name').value = ''; this.toast('success', '追加しました'); this.loadDailyTasks();
    }).saveTask({type, value, name, deadline});
  },
  deleteTask: function(uuid) {
    Swal.fire({ title: 'ルールを削除しますか？', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: '削除' }).then((result) => {
      if (result.isConfirmed) { this.showLoading(true); google.script.run.withSuccessHandler(data => { this.showLoading(false); this.renderAdminList(data.tasks); this.toast('success', '削除しました'); this.loadDailyTasks(); }).deleteTask(uuid); }
    });
  },

  renderStudentList: function(students) {
    const list = document.getElementById('admin-student-list'); list.innerHTML = '';
    students.forEach(st => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${st.id}</td><td>${st.name}</td><td class="text-end"><button class="btn btn-sm btn-outline-primary me-1" onclick="app.showEditStudentModal('${st.id}','${st.name}','${st.email}')"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-outline-danger" onclick="app.deleteStudent('${st.id}')"><i class="bi bi-trash"></i></button></td>`;
      list.appendChild(tr);
    });
  },
  showAddStudentModal: function() { this.showEditStudentModal('', '', ''); },
  showEditStudentModal: function(id, name, email) {
    Swal.fire({
      title: id ? '児童情報の編集' : '児童の追加',
      html: `<input id="swal-st-id" class="swal2-input" placeholder="ID" value="${id}" ${id ? 'readonly' : ''}><input id="swal-st-name" class="swal2-input" placeholder="名前" value="${name}"><input id="swal-st-email" class="swal2-input" placeholder="メール(任意)" value="${email}">`,
      focusConfirm: false, showCancelButton: true, confirmButtonText: '保存',
      preConfirm: () => {
        const newId = document.getElementById('swal-st-id').value; const newName = document.getElementById('swal-st-name').value; const newEmail = document.getElementById('swal-st-email').value;
        if (!newId || !newName) { Swal.showValidationMessage('IDと名前は必須です'); } return { id: newId, name: newName, email: newEmail };
      }
    }).then((result) => {
      if (result.isConfirmed) { this.showLoading(true); google.script.run.withSuccessHandler(data => { this.showLoading(false); this.renderStudentList(data.students); this.toast('success', '保存しました'); }).saveStudent(result.value); }
    });
  },
  showBulkAddStudentModal: function() {
    Swal.fire({
      title: '一括登録',
      html: `<p class="text-muted small text-start">以下の形式で入力・貼付してください：<br>ID,名前,メール(任意)</p><textarea id="swal-bulk-text" class="form-control" style="height: 200px;" placeholder="1001,佐藤,sato@ex.com&#10;1002,鈴木,suzuki@ex.com"></textarea>`,
      showCancelButton: true, confirmButtonText: '登録', width: '600px', preConfirm: () => document.getElementById('swal-bulk-text').value
    }).then((result) => {
      if (result.isConfirmed && result.value) {
        this.showLoading(true); google.script.run.withSuccessHandler(data => { this.showLoading(false); this.renderStudentList(data.students); this.toast('success', '一括登録しました'); }).bulkSaveStudents(result.value);
      }
    });
  },
  deleteStudent: function(id) {
    Swal.fire({ title: '削除しますか？', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: '削除' }).then((result) => {
      if (result.isConfirmed) { this.showLoading(true); google.script.run.withSuccessHandler(data => { this.showLoading(false); this.renderStudentList(data.students); this.toast('success', '削除しました'); }).deleteStudent(id); }
    });
  },

  setPeriod: function(type) {
    const today = new Date();
    const startEl = document.getElementById('report-start'); const endEl = document.getElementById('report-end');
    const fmt = d => d.toISOString().split('T')[0];
    if (type === 'day') { startEl.value = fmt(today); endEl.value = fmt(today); }
    else if (type === 'week') {
      const day = today.getDay(); const diff = today.getDate() - day + (day == 0 ? -6 : 1);
      const monday = new Date(today.setDate(diff)); const friday = new Date(today.setDate(diff + 4));
      startEl.value = fmt(monday); endEl.value = fmt(friday);
    } else if (type === 'month') {
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      startEl.value = fmt(firstDay); endEl.value = fmt(new Date());
    } else if (type === 'term') { const year = today.getFullYear(); startEl.value = `${year}-04-01`; endEl.value = `${year}-07-20`; }
    this.loadReport();
  },
  loadReport: function() {
    const startStr = document.getElementById('report-start').value; const endStr = document.getElementById('report-end').value;
    if(!startStr || !endStr) return;
    this.showLoading(true);
    google.script.run.withSuccessHandler(report => {
      this.showLoading(false);
      document.getElementById('report-result').classList.remove('d-none');
      document.getElementById('report-overall-rate').innerText = report.overallRate;
      const list = document.getElementById('report-student-stats'); list.innerHTML = '';
      report.students.forEach(st => {
        const li = document.createElement('li'); li.className = 'list-group-item d-flex align-items-center justify-content-between';
        let colorClass = 'bg-danger'; if (st.rate >= 80) colorClass = 'bg-success'; else if (st.rate >= 50) colorClass = 'bg-warning';
        li.innerHTML = `<div style="width: 30%; font-weight: bold;">${st.name}</div><div class="flex-grow-1 mx-2"><div class="progress" style="height: 20px;"><div class="progress-bar ${colorClass}" role="progressbar" style="width: ${st.rate}%">${st.rate}%</div></div></div><div class="text-muted small" style="width: 60px; text-align: right;">${st.submitted}/${st.required}</div>`;
        list.appendChild(li);
      });
      if(report.students.length === 0) list.innerHTML = '<li class="list-group-item text-center text-muted">データがありません</li>';
    }).getPeriodReport(startStr, endStr);
  },

  saveConfig: function() {
    const notification_time = document.getElementById('conf-time').value;
    const email_subject = document.getElementById('conf-subject').value;
    const admin_password = document.getElementById('conf-pass').value;
    const notification_email = document.getElementById('conf-email').value; // 追加
    this.showLoading(true);
    google.script.run.withSuccessHandler(() => { this.showLoading(false); Swal.fire('保存しました', '通知設定を更新しました。', 'success'); }).saveConfig({notification_time, email_subject, admin_password, notification_email});
  },
  resetForNewYear: function() {
    Swal.fire({ title: '年度更新', html: `<div class="text-start"><p>データリセットを実行します。</p></div>`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc3545', confirmButtonText: '実行' }).then((result) => {
      if (result.isConfirmed) { this.showLoading(true); google.script.run.withSuccessHandler(() => { this.showLoading(false); Swal.fire('完了', '準備ができました。', 'success').then(() => location.reload()); }).resetForNewYear(); }
    });
  },

  toast: function(icon, title) { const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true }); Toast.fire({ icon: icon, title: title }); },
  errorHandler: function(e) { app.showLoading(false); Swal.fire('エラー', e.message, 'error'); }
};

window.onload = () => app.init(IS_SETUP);
</script>
