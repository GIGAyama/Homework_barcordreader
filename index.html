  <style>
    body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
    ruby { ruby-position: over; ruby-align: center; }
    rt { font-size: 0.6em; color: #64748b; font-weight: 600; line-height: 1; letter-spacing: -0.05em; }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    .stagger-2 { animation-delay: 200ms; opacity: 0; }
    .stagger-3 { animation-delay: 300ms; opacity: 0; }

</head>
<body class="bg-premium-pattern">
  <div id="root"></div>
  <div id="gas-data" data-setup="<?= typeof isSetup !== 'undefined' ? isSetup : false ?>" style="display:none;"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const gasDataEl = document.getElementById('gas-data');
    const setupVal = gasDataEl ? gasDataEl.getAttribute('data-setup') : 'false';
    const INITIAL_SETUP_STATE = setupVal === 'true' || setupVal === '1';

    // =========================================================================
    // 🛡️ Auto-Retry Proxy Engine
    // =========================================================================
    const callGasWithRetry = (methodName, args, retries = 3) => {
      return new Promise((resolve, reject) => {
        const attempt = (n) => {
          if (typeof google === 'undefined') { 
            setTimeout(() => {
              if(methodName==='runInitialSetup') resolve({success:true});
              else if(methodName==='getStudentData') resolve({error:false, student:{id:'1001',name:'山田 太郎'}, tasks:[{name:'音読',type:'毎日',done:false},{name:'計算ドリル',type:'毎日',done:true}]});
              else if(methodName==='submitHomeworkAndFeeling') resolve({success:true});
              else if(methodName==='verifyPassword') resolve(args[0]==='1234');
              else if(methodName==='getAdminData') resolve({tasks:[], students:[{id:'1001',name:'山田太郎',email:''}], config:{notification_time:'17', admin_password:'1234'}});
              else if(methodName==='getTodayFeelings') resolve([{id:'1001',name:'山田太郎',feeling:'げんき',time:'08:15'}]);
              else if(methodName==='getAdminDailyTasks') resolve([]);
              else resolve({success:true});
            }, 300);
            return;
          }

          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler((err) => {
              if (n === 1) reject(err);
              else { setTimeout(() => attempt(n - 1), (4 - n) * 1000); }
            })
            [methodName](...args);
        };
        attempt(retries);
      });
    };

    const server = new Proxy({}, { get: (target, prop) => (...args) => callGasWithRetry(prop, args) });

    // =========================================================================
    // 🎨 Icons
    // =========================================================================
    const Icons = {
      Mailbox: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9.5C2 7 4 5 6.5 5H18c2.2 0 4 1.8 4 4v8Z"/><polyline points="15,9 18,9 18,11"/><path d="M6.5 5C9 5 11 7 11 9.5V17a2 2 0 0 1-2 2v0"/></svg>,
      Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Scan: () => <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="2"/></svg>,
      Keypad: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="3" ry="3"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Circle: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>,
      Close: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
      SettingsConfig: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    };

    const RubyText = ({ text, kana }) => ( <ruby>{text}<rt>{kana}</rt></ruby> );

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
      const isError = type === 'error';
      return (
        <div className={`fixed bottom-10 left-1/2 transform -translate-x-1/2 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-card z-50 animate-fade-in-up ${isError ? 'bg-white border-l-4 border-red-500 text-red-700' : 'bg-gray-900 text-white'}`}>
          {isError ? <div className="w-6 h-6 rounded-full bg-red-100 text-red-500 flex items-center justify-center font-bold">!</div> : <Icons.Check />}
          <span className="font-bold text-sm tracking-wide">{message}</span>
        </div>
      );
    };

    const FullScreenLoader = ({ message = <><RubyText text="通信中" kana="つうしんちゅう" />...</> }) => (
      <div className="fixed inset-0 glass-panel z-50 flex flex-col justify-center items-center">
        <div className="relative w-16 h-16 mb-6">
          <div className="absolute inset-0 rounded-full border-4 border-primary/20"></div>
          <div className="absolute inset-0 rounded-full border-4 border-primary border-t-transparent animate-spin"></div>
        </div>
        <p className="text-gray-600 font-bold tracking-widest text-sm">{message}</p>
      </div>
    );

    const Modal = ({ isOpen, title, onClose, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex justify-center items-center p-4">
          <div className="bg-white rounded-[2rem] shadow-card w-full max-w-md overflow-hidden flex flex-col max-h-full animate-fade-in-up">
            <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-gray-50/50">
              <h3 className="font-bold text-lg text-gray-800 tracking-tight">{title}</h3>
              <button onClick={onClose} className="p-2 rounded-full hover:bg-gray-200 text-gray-500 transition-colors"><Icons.Close /></button>
            </div>
            <div className="p-6 overflow-y-auto">{children}</div>
          </div>
        </div>
      );
    };

    // =========================================================================
    // 📱 VIEWS
    // =========================================================================
    const StandbyView = ({ onScan, isModalOpen }) => {
      const [mode, setMode] = useState('barcode');
      const [keypadVal, setKeypadVal] = useState('');
      const inputRef = useRef(null);

      useEffect(() => {
        const focusInput = () => { if (!isModalOpen && mode === 'barcode' && inputRef.current && document.activeElement !== inputRef.current) inputRef.current.focus(); };
        const timer = setInterval(focusInput, 500);
        return () => clearInterval(timer);
      }, [mode, isModalOpen]);

      const handleBarcodeSubmit = (e) => {
        e.preventDefault();
        if (inputRef.current.value.trim()) { onScan(inputRef.current.value.trim()); inputRef.current.value = ''; }
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-full w-full px-4 py-8 relative">
          <div className="w-full max-w-sm mx-auto">
            {mode === 'barcode' ? (
              <div className="bg-white rounded-[2rem] p-8 shadow-card flex flex-col items-center animate-fade-in-up border border-gray-100">
                <h2 className="text-2xl font-bold text-gray-800 mb-6 tracking-tight"><RubyText text="見" kana="み" />せてね</h2>
                <div className="text-gray-200 mb-8 transform scale-125 animate-pulse-soft"><Icons.Scan /></div>
                <button onClick={() => setMode('keypad')} className="flex items-center justify-center w-full bg-gray-50 text-gray-700 hover:bg-gray-100 px-6 py-4 rounded-2xl font-bold transition-all active:scale-95 border border-gray-100 hover:shadow-sm group">
                  <span className="text-gray-400 group-hover:text-primary transition-colors"><Icons.Keypad /></span>
                  <span className="ml-3"><RubyText text="数字" kana="すうじ" />でいれる</span>
                </button>
                <form onSubmit={handleBarcodeSubmit}><input ref={inputRef} type="text" className="opacity-0 absolute top-0 left-0 w-1 h-1" autoComplete="off" autoFocus /></form>
              </div>
            ) : (
              <div className="bg-white rounded-[2rem] p-6 shadow-card animate-fade-in-up text-center border border-gray-100">
                <h2 className="text-lg font-bold text-gray-500 tracking-wider mb-4">ID NUMBER</h2>
                <div className="bg-gray-50 border-2 border-gray-100 h-20 rounded-2xl flex items-center justify-center text-4xl font-bold tracking-[0.2em] text-primary mb-6 shadow-inner">{keypadVal || <span className="text-gray-200">-</span>}</div>
                <div className="grid grid-cols-3 gap-3 mb-6">
                  {['7','8','9','4','5','6','1','2','3'].map(n => (
                    <button key={n} onClick={() => setKeypadVal(v => (v.length < 10 ? v + n : v))} className="bg-white text-2xl font-bold py-4 rounded-2xl shadow-sm border border-gray-100 active:scale-90 hover:bg-gray-50 transition-all text-gray-700">{n}</button>
                  ))}
                  <button onClick={() => setKeypadVal('')} className="bg-red-50 text-red-500 text-sm font-bold py-4 rounded-2xl active:scale-90 transition-all border border-red-100">クリア</button>
                  <button onClick={() => setKeypadVal(v => (v.length < 10 ? v + '0' : v))} className="bg-white text-2xl font-bold py-4 rounded-2xl shadow-sm border border-gray-100 active:scale-90 hover:bg-gray-50 transition-all text-gray-700">0</button>
                  <button onClick={() => { if(keypadVal){onScan(keypadVal); setKeypadVal('');} }} className="bg-primary hover:bg-indigo-500 text-white text-xl font-bold py-4 rounded-2xl shadow-md active:scale-90 flex justify-center items-center transition-all">OK</button>
                </div>
                <button onClick={() => setMode('barcode')} className="text-gray-400 font-bold text-sm p-3 hover:text-gray-600 transition-colors">キャンセル</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const StudentTasksView = ({ student, tasks, onNext, onCancel }) => {
      const [selected, setSelected] = useState([]);
      const toggleTask = (tName) => setSelected(p => p.includes(tName) ? p.filter(t => t !== tName) : [...p, tName]);

      return (
        <div className="flex flex-col min-h-full max-w-lg mx-auto w-full px-4 py-6">
          <div className="bg-white rounded-3xl shadow-card p-6 text-center mb-8 animate-fade-in-up stagger-1 border border-gray-100/50">
            <span className="text-primary font-bold tracking-widest text-xs mb-2 block">HELLO</span>
            <h2 className="text-3xl font-bold text-gray-800 tracking-tight">{student.name} <span className="text-lg text-gray-500 font-normal">さん</span></h2>
          </div>

          <div className="flex items-center gap-3 mb-6 px-2 animate-fade-in-up stagger-2">
            <div className="w-1.5 h-6 bg-yellow-400 rounded-full"></div>
            <h3 className="font-bold text-xl text-gray-800"><RubyText text="今日" kana="きょう" />だすもの</h3>
          </div>
          
          <div className="grid grid-cols-2 gap-4 mb-10 animate-fade-in-up stagger-3">
            {tasks.length === 0 ? (
               <div className="col-span-2 text-center text-gray-400 py-10 font-bold bg-white/50 backdrop-blur rounded-[2rem] border border-dashed border-gray-200"><RubyText text="今日" kana="きょう" />はありません 🎉</div>
            ) : (
              tasks.map(task => {
                const isSel = selected.includes(task.name);
                const isDone = task.done;
                return (
                  <button key={task.name} disabled={isDone} onClick={() => toggleTask(task.name)} 
                    className={`relative p-5 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 active:scale-95 border-2 ${isDone ? 'bg-gray-50 border-gray-100 text-gray-300' : isSel ? 'bg-indigo-50 border-primary text-primary shadow-lg scale-[1.02] z-10' : 'bg-white border-transparent shadow-card text-gray-700 hover:border-indigo-100'}`}>
                    {task.type === '週回数' && <span className="absolute top-3 left-3 text-[10px] font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full"><RubyText text="週" kana="しゅう" /> {task.weeklyCount}/{task.weeklyTarget}<RubyText text="回" kana="かい" /></span>}
                    <div className={`mt-3 mb-3 transform transition-transform ${isSel ? 'scale-110' : ''}`}>
                      {isDone || isSel ? <Icons.Check /> : <Icons.Circle />}
                    </div>
                    <span className="font-bold text-center text-[15px] leading-tight">{task.name}</span>
                    {isDone && <span className="text-[10px] mt-2 font-bold bg-green-100 text-green-700 px-2 py-1 rounded-md tracking-wider"><RubyText text="提出済" kana="ていしゅつずみ" /></span>}
                  </button>
                );
              })
            )}
          </div>
          
          <div className="mt-auto flex flex-col gap-4 animate-fade-in-up animate-delay-300 pb-4">
            <button onClick={() => selected.length > 0 && onNext(tasks.filter(t => selected.includes(t.name)).map(t => ({name: t.name, date: t.date})))} disabled={selected.length === 0} 
              className={`py-5 rounded-2xl font-bold text-lg transition-all duration-300 ${selected.length > 0 ? 'bg-primary text-white shadow-lg hover:bg-indigo-500 active:scale-95 translate-y-0' : 'bg-gray-200 text-gray-400 translate-y-1'}`}>
              つぎへ
            </button>
            <button onClick={onCancel} className="py-4 text-gray-400 font-bold hover:text-gray-600 transition-colors">やめる</button>
          </div>
        </div>
      );
    };

    const FeelingView = ({ onFeelingSelect }) => {
      const feelings = [
        { id: 'げんき', emoji: '😊', label: 'げんき', color: 'bg-amber-50 text-amber-600 hover:bg-amber-100 border-amber-200 shadow-amber-100/50' },
        { id: 'ねむい', emoji: '🥱', label: 'ねむい', color: 'bg-cyan-50 text-cyan-600 hover:bg-cyan-100 border-cyan-200 shadow-cyan-100/50' },
        { id: 'イライラ', emoji: '😡', label: 'イライラ', color: 'bg-rose-50 text-rose-600 hover:bg-rose-100 border-rose-200 shadow-rose-100/50' },
        { id: 'かなしい', emoji: '😢', label: 'かなしい', color: 'bg-violet-50 text-violet-600 hover:bg-violet-100 border-violet-200 shadow-violet-100/50' }
      ];
      return (
        <div className="flex flex-col min-h-full max-w-lg mx-auto w-full px-4 py-8 items-center justify-center pb-12">
          <h2 className="text-2xl font-bold text-gray-800 mb-10 text-center tracking-tight leading-relaxed animate-fade-in-up">いまの「きもち」を<br/>おしえてね！</h2>
          <div className="grid grid-cols-2 gap-5 w-full animate-fade-in-up stagger-1">
            {feelings.map(f => (
              <button key={f.id} onClick={() => onFeelingSelect(f.id)} className={`flex flex-col items-center justify-center p-8 rounded-[2.5rem] border shadow-lg transition-all duration-300 hover:scale-105 hover:-translate-y-1 active:scale-95 ${f.color}`}>
                <span className="text-6xl mb-4 filter drop-shadow-sm">{f.emoji}</span>
                <span className="font-bold tracking-wide">{f.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    };

    const CompleteView = ({ onFinish }) => {
      useEffect(() => {
        confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 }, colors: ['#4f46e5', '#10b981', '#f59e0b', '#ec4899'] });
        const timer = setTimeout(onFinish, 3000);
        return () => clearTimeout(timer);
      }, []);

      return (
        <div className="flex flex-col min-h-full max-w-lg mx-auto w-full px-4 py-10 items-center justify-center text-center animate-fade-in-up">
          <div className="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-6 animate-bounce">
            <Icons.Check />
          </div>
          <h2 className="text-4xl font-bold text-gray-800 mb-4 tracking-tight"><RubyText text="提出" kana="ていしゅつ" /><RubyText text="完了" kana="かんりょう" />！</h2>
          <p className="font-bold text-gray-500 text-lg">よくがんばりました✨</p>
        </div>
      );
    };

    // =========================================================================
    // 📊 Admin Dashboard & Settings
    // =========================================================================
    const AdminDashboard = ({ tasks, students, feelings, setTab }) => {
      const stTotal = students.length;
      const fTotal = feelings.length;
      const rate = stTotal > 0 ? Math.round((fTotal / stTotal) * 100) : 0;
      const emoCount = { 'げんき':0, 'ねむい':0, 'イライラ':0, 'かなしい':0 };
      feelings.forEach(f => { if(emoCount[f.feeling]!==undefined) emoCount[f.feeling]++; });

      return (
        <div className="space-y-6 animate-fade-in-up">
          <div className="bg-white rounded-[2rem] p-6 shadow-card border border-gray-50 relative overflow-hidden">
             <div className="absolute -right-6 -top-6 text-gray-50 opacity-50 transform scale-[4]"><Icons.Activity /></div>
             <h3 className="text-xs font-bold text-gray-400 tracking-widest mb-4 relative z-10">TODAY'S SUBMISSION</h3>
             <div className="flex items-end gap-2 mb-2 relative z-10">
               <span className="text-5xl font-bold text-gray-800 tracking-tighter">{rate}</span><span className="text-xl text-gray-400 font-bold mb-1">%</span>
             </div>
             <p className="text-sm text-gray-500 font-bold mb-4 relative z-10">{stTotal}名中 {fTotal}名 がアクション済み</p>
             <div className="w-full bg-gray-100 rounded-full h-3 overflow-hidden relative z-10">
               <div className={`h-full rounded-full transition-all duration-1000 ${rate>=80?'bg-green-500':rate>=50?'bg-amber-400':'bg-rose-500'}`} style={{width: `${rate}%`}}></div>
             </div>
          </div>

          <div className="bg-white rounded-[2rem] p-6 shadow-card border border-gray-50">
             <h3 className="text-xs font-bold text-gray-400 tracking-widest mb-5">MORNING FEELINGS</h3>
             <div className="grid grid-cols-4 gap-2">
               {[{l:'げんき',e:'😊',c:'text-amber-500',bg:'bg-amber-50'},{l:'ねむい',e:'🥱',c:'text-cyan-500',bg:'bg-cyan-50'},{l:'イライラ',e:'😡',c:'text-rose-500',bg:'bg-rose-50'},{l:'かなしい',e:'😢',c:'text-violet-500',bg:'bg-violet-50'}].map(item => (
                 <div key={item.l} className={`${item.bg} rounded-2xl p-3 flex flex-col items-center justify-center text-center`}>
                   <span className="text-2xl mb-1">{item.e}</span>
                   <span className={`text-xl font-bold ${item.c}`}>{emoCount[item.l]}</span>
                 </div>
               ))}
             </div>
             <button onClick={()=>setTab('feelings')} className="w-full mt-5 text-sm font-bold text-primary bg-indigo-50 py-3 rounded-xl hover:bg-indigo-100 transition-colors">詳細なリストを見る</button>
          </div>
        </div>
      );
    };

    const AdminView = ({ onClose, showToast, setLoading }) => {
      const [activeTab, setActiveTab] = useState('overview');
      const [data, setData] = useState({ tasks: [], students: [], config: {} });
      const [feelings, setFeelings] = useState([]);
      const [dailyTasks, setDailyTasks] = useState([]);
      const [checkDate, setCheckDate] = useState(new Date().toISOString().split('T')[0]);
      const [newTask, setNewTask] = useState({ type: '曜日固定', value: '月', name: '', deadline: '' });

      const loadAll = async () => {
        setLoading(true);
        try {
          const [adminRes, feelRes, dailyRes] = await Promise.all([server.getAdminData(), server.getTodayFeelings(), server.getAdminDailyTasks(checkDate)]);
          setData(adminRes); setFeelings(feelRes); setDailyTasks(dailyRes);
        } catch(e) { showToast(e.message, 'error'); }
        setLoading(false);
      };
      useEffect(() => { loadAll(); }, [checkDate]);

      const execTask = async (msg, func) => {
        setLoading(true); try{ await func(); showToast(msg); await loadAll(); } catch(e){ showToast(e.message, 'error'); } setLoading(false);
      };

      const handleSaveConfig = async (e) => {
        e.preventDefault();
        execTask('設定を保存しました', () => server.saveConfig({
          notification_time: e.target.time.value,
          email_subject: e.target.subject.value,
          notification_email: e.target.email.value,
          admin_password: e.target.password.value
        }));
      };

      const tabs = [
        { id: 'overview', icon: <Icons.Activity />, label: 'Dashboard' },
        { id: 'feelings', icon: <Icons.Users />, label: 'きもち' },
        { id: 'tasks', icon: <Icons.Check />, label: '課題' },
        { id: 'settings', icon: <Icons.SettingsConfig />, label: '設定' },
      ];

      return (
        <div className="flex flex-col h-full bg-gray-50/50">
          <div className="flex justify-between items-center p-5 bg-white/80 backdrop-blur-md sticky top-0 z-20 border-b border-gray-100">
            <div><span className="text-xs font-bold text-primary tracking-widest block mb-1">WORKSPACE</span><h2 className="font-bold text-lg text-gray-800 tracking-tight">先生用メニュー</h2></div>
            <button onClick={onClose} className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-colors"><Icons.Close /></button>
          </div>
          
          <div className="p-4 overflow-x-auto hide-scrollbar flex gap-2 sticky top-[73px] bg-gray-50/90 backdrop-blur-sm z-10 border-b border-gray-100">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-bold text-sm whitespace-nowrap transition-all ${activeTab === tab.id ? 'bg-gray-900 text-white shadow-md' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}>
                <span className="scale-75">{tab.icon}</span>{tab.label}
              </button>
            ))}
          </div>

          <div className="flex-1 overflow-y-auto p-4 pb-12">
            {activeTab === 'overview' && <AdminDashboard tasks={data.tasks} students={data.students} feelings={feelings} setTab={setActiveTab} />}
            
            {activeTab === 'feelings' && (
              <div className="bg-white rounded-[2rem] shadow-card overflow-hidden animate-fade-in-up border border-gray-50">
                <div className="p-5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                  <span className="font-bold text-gray-700 tracking-tight">登校時のきもち一覧</span>
                  <span className="text-xs bg-white px-3 py-1 rounded-full shadow-sm text-gray-500 font-bold border border-gray-200">提出済: {feelings.length}名</span>
                </div>
                {feelings.length === 0 ? <div className="p-10 text-center text-gray-400 font-bold">まだデータがありません</div> : 
                  <div className="divide-y divide-gray-100">
                    {feelings.map(f => {
                      const emo = f.feeling==='げんき'?'😊':f.feeling==='ねむい'?'🥱':f.feeling==='イライラ'?'😡':'😢';
                      return (
                        <div key={f.id} className="flex items-center justify-between p-5 hover:bg-gray-50 transition-colors">
                          <div className="flex items-center gap-4">
                            <span className="text-3xl filter drop-shadow-sm">{emo}</span>
                            <div><div className="font-bold text-gray-800">{f.name}</div><div className="text-xs text-gray-500 mt-0.5">{f.feeling}</div></div>
                          </div>
                          <span className="text-xs text-gray-400 font-mono font-bold bg-gray-100 px-2 py-1 rounded">{f.time}</span>
                        </div>
                      )
                    })}
                  </div>
                }
              </div>
            )}

            {activeTab === 'tasks' && (
               <div className="space-y-6 animate-fade-in-up">
                  <div className="bg-white p-6 rounded-[2rem] shadow-card border border-gray-50">
                    <h3 className="text-xs font-bold text-gray-400 tracking-widest mb-4">NEW RULE</h3>
                    <div className="grid grid-cols-1 gap-4">
                      <select value={newTask.type} onChange={e=>setNewTask({...newTask,type:e.target.value})} className="w-full rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm font-bold focus:ring-2 focus:ring-primary focus:outline-none"><option value="曜日固定">曜日固定</option><option value="日付指定">日付指定</option><option value="毎日（平日）">毎日（平日）</option><option value="週回数">週の回数指定</option></select>
                      {newTask.type==='曜日固定'&&<select value={newTask.value} onChange={e=>setNewTask({...newTask,value:e.target.value})} className="w-full rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm focus:ring-2 focus:ring-primary focus:outline-none">{['月','火','水','木','金'].map(d=><option key={d} value={d}>{d}曜日</option>)}</select>}
                      {newTask.type==='日付指定'&&<input type="date" value={newTask.value} onChange={e=>setNewTask({...newTask,value:e.target.value})} className="w-full rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm" />}
                      {newTask.type==='週回数'&&<div className="flex items-center gap-3"><span className="text-sm font-bold text-gray-600">週</span><input type="number" min="1" max="7" value={newTask.value} onChange={e=>setNewTask({...newTask,value:e.target.value})} className="w-24 rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm text-center font-bold" /><span className="text-sm font-bold text-gray-600">回</span></div>}
                      <input type="text" placeholder="課題名 (例: 音読)" value={newTask.name} onChange={e=>setNewTask({...newTask,name:e.target.value})} className="w-full rounded-xl border border-gray-200 bg-gray-50 p-3 font-bold focus:ring-2 focus:ring-primary focus:outline-none" />
                      <button onClick={()=>execTask('追加しました', ()=>server.saveTask(newTask))} className="w-full bg-gray-900 text-white font-bold py-3.5 rounded-xl active:scale-95 shadow-md">追加する</button>
                    </div>
                  </div>
                  <div className="bg-white rounded-[2rem] shadow-card overflow-hidden border border-gray-50">
                    <div className="px-5 py-4 bg-gray-50/50 border-b border-gray-100 font-bold text-sm text-gray-600">現在のルール</div>
                    {data.tasks.map(t => (
                      <div key={t.uuid} className="flex justify-between items-center p-4 border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors">
                        <div><span className="text-[10px] font-bold bg-indigo-50 text-primary px-2 py-1 rounded-md mr-2">{t.type}</span><span className="font-bold text-gray-800 text-sm">{t.name}</span></div>
                        <button onClick={() => confirm('削除しますか？') && execTask('削除しました', ()=>server.deleteTask(t.uuid))} className="text-gray-300 hover:text-red-500 p-2"><Icons.Trash /></button>
                      </div>
                    ))}
                  </div>
               </div>
            )}
            
            {activeTab === 'settings' && (
              <form onSubmit={handleSaveConfig} className="bg-white p-6 rounded-[2rem] shadow-card border border-gray-50 space-y-5 animate-fade-in-up">
                <h3 className="text-xs font-bold text-gray-400 tracking-widest mb-2 border-b pb-2">システム設定</h3>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5">未提出通知の送信時間（時）</label>
                  <select name="time" defaultValue={data.config.notification_time || '17'} className="w-full rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm font-bold focus:ring-2 focus:ring-primary focus:outline-none">
                    {['15','16','17','18','19'].map(h => <option key={h} value={h}>{h}:00</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5">通知先メールアドレス</label>
                  <input type="email" name="email" defaultValue={data.config.notification_email || ''} placeholder="未入力の場合はGAS実行者に送信" className="w-full rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm focus:ring-2 focus:ring-primary focus:outline-none" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5">メールの件名</label>
                  <input type="text" name="subject" defaultValue={data.config.email_subject || '【未提出通知】'} className="w-full rounded-xl border border-gray-200 bg-gray-50 p-3 text-sm font-bold focus:ring-2 focus:ring-primary focus:outline-none" />
                </div>
                
                <h3 className="text-xs font-bold text-red-400 tracking-widest mb-2 border-b pb-2 pt-4">セキュリティ設定</h3>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5">管理画面PINコード (数字推奨)</label>
                  <input type="text" name="password" defaultValue={data.config.admin_password || ''} placeholder="変更する場合のみ入力" className="w-full rounded-xl border border-red-200 bg-red-50 p-3 text-lg font-mono tracking-widest font-bold text-red-700 focus:ring-2 focus:ring-red-400 focus:outline-none" />
                  <p className="text-[10px] text-gray-400 mt-2 leading-tight">※パスワードはスプレッドシート上ではなく、GASの安全な領域（スクリプトプロパティ）に暗号化されて保存されます。</p>
                </div>
                <div className="pt-4">
                  <button type="submit" className="w-full bg-gray-900 text-white font-bold py-4 rounded-xl active:scale-95 shadow-md hover:bg-gray-800 transition-colors">設定を保存</button>
                </div>
              </form>
            )}
          </div>
        </div>
      );
    };

    // =========================================================================
    // 🚀 ROOT APP
    // =========================================================================
    const App = () => {
      const [view, setView] = useState(INITIAL_SETUP_STATE ? 'standby' : 'initializing'); 
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState(null);
      const [studentData, setStudentData] = useState(null);
      const [selectedTasks, setSelectedTasks] = useState([]);
      const [authModalOpen, setAuthModalOpen] = useState(false);

      const showToast = (message, type = 'success') => setToast({ message, type });

      useEffect(() => {
        if (!INITIAL_SETUP_STATE) {
          const autoSetup = async () => {
            try { await server.runInitialSetup(); showToast('システム準備完了'); setView('standby'); } 
            catch(e) { showToast(e.message, 'error'); setView('standby'); }
          };
          autoSetup();
        }
      }, []);

      const handleScan = async (id) => {
        setIsLoading(true);
        try { const res = await server.getStudentData(id); if (res.error) throw new Error(res.message); setStudentData(res); setView('student'); } 
        catch(e) { showToast(e.message, 'error'); }
        setIsLoading(false);
      };

      const handleFeelingSelect = async (feelingId) => {
        setIsLoading(true);
        try {
          await server.submitHomeworkAndFeeling({ id: studentData.student.id, name: studentData.student.name, tasks: selectedTasks, feeling: feelingId });
          setView('complete');
        } catch(e) { showToast(e.message, 'error'); setView('standby'); }
        setIsLoading(false);
      };

      const handleAdminAuth = async (e) => {
        e.preventDefault(); setIsLoading(true);
        try { const isValid = await server.verifyPassword(e.target.password.value); if(isValid) { setAuthModalOpen(false); setView('admin'); } else { showToast('PINエラー', 'error'); } } 
        catch(err) { showToast(err.message, 'error'); }
        setIsLoading(false);
      };

      return (
        <div className="h-screen w-full flex flex-col font-sans overflow-hidden text-gray-800">
          {isLoading && <FullScreenLoader />}
          {view === 'initializing' && <FullScreenLoader message={<><RubyText text="準備" kana="じゅんび" />しています...</>} />}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          <header className="flex-none glass-panel z-40 px-5 py-4 flex justify-between items-center shadow-sm">
            <div className="flex items-center text-primary gap-2">
              <Icons.Mailbox />
              <h1 className="font-bold text-xl tracking-tighter"><RubyText text="宿題" kana="しゅくだい" />ポスト</h1>
            </div>
            {view !== 'admin' && view !== 'initializing' && (
              <button onClick={() => setAuthModalOpen(true)} className="p-2.5 text-gray-400 hover:text-primary hover:bg-indigo-50 rounded-full transition-all">
                <Icons.Settings />
              </button>
            )}
          </header>

          <main className="flex-1 overflow-y-auto relative">
            {view === 'standby' && <StandbyView onScan={handleScan} isModalOpen={authModalOpen} />}
            {view === 'student' && studentData && <StudentTasksView student={studentData.student} tasks={studentData.tasks} onNext={t=>{setSelectedTasks(t);setView('feeling');}} onCancel={()=>setView('standby')} />}
            {view === 'feeling' && <FeelingView onFeelingSelect={handleFeelingSelect} />}
            {view === 'complete' && <CompleteView onFinish={()=>{setStudentData(null);setSelectedTasks([]);setView('standby');}} />}
            {view === 'admin' && <AdminView onClose={() => setView('standby')} showToast={showToast} setLoading={setIsLoading} />}
          </main>

          {/* フッター */}
          {view !== 'admin' && view !== 'initializing' && (
            <footer className="flex-none w-full text-center text-gray-400 py-3 bg-white/80 backdrop-blur-md border-t border-gray-100 text-sm z-30">
              <span>© 2026 宿題ポスト <a href="https://note.com/cute_borage86" target="_blank" rel="noopener noreferrer" className="no-underline text-inherit hover:opacity-80 transition-opacity">GIGA山</a></span>
            </footer>
          )}

          <Modal isOpen={authModalOpen} title="先生用メニュー" onClose={() => setAuthModalOpen(false)}>
            <form onSubmit={handleAdminAuth} className="flex flex-col gap-5">
              <p className="text-sm text-gray-500 font-bold">PINコードを入力してください。</p>
              <input type="password" name="password" placeholder="****" autoFocus className="bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 text-center text-2xl tracking-[0.5em] font-mono focus:border-primary focus:outline-none transition-colors" />
              <button type="submit" className="bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-md active:scale-95 transition-all hover:bg-gray-800">認証</button>
            </form>
          </Modal>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
